# Render Blueprint for the ChargeFlow Agent backend (Express API).
# Deploy: Render Dashboard → New → Blueprint → connect this repo.
# The frontend is deployed separately on Vercel (see vercel.json).
services:
  - type: web
    name: chargeflow-agent-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # Set your real key in the Render dashboard (Environment → Add Secret).
      # Mark it as a secret; do NOT commit it.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      # Your deployed Vercel URL (no trailing slash). Update after the first
      # Vercel deploy, then redeploy this service. Comma-separate multiple origins.
      - key: CLIENT_ORIGIN
        sync: false
      - key: RATE_LIMIT_MAX
        value: "20"
